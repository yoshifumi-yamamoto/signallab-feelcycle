name: Fetch FEELCYCLE My Page

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

jobs:
  fetch-mypage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Fetch workout history
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEELCYCLE_EMAIL: ${{ secrets.FEELCYCLE_EMAIL }}
          FEELCYCLE_PASSWORD: ${{ secrets.FEELCYCLE_PASSWORD }}
          FEELCYCLE_LOGIN_URL: ${{ secrets.FEELCYCLE_LOGIN_URL }}
          FEELCYCLE_HISTORY_URL: ${{ secrets.FEELCYCLE_HISTORY_URL }}
          FEELCYCLE_HEADLESS: "true"
          FEELCYCLE_MANUAL_LOGIN: "false"
          FEELCYCLE_HISTORY_MONTHS: ${{ secrets.FEELCYCLE_HISTORY_MONTHS }}
          FEELCYCLE_SAVE_SNAPSHOTS: "false"
          FEELCYCLE_SAVE_LOCAL_RECORDS: "false"
        run: npm run dev:fetch-mypage
